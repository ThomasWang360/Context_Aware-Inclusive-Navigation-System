version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  appsmith:
    image: index.docker.io/appsmith/appsmith-ce   
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/appsmith/stacks:/appsmith-stacks
    depends_on:
      backend:                                     
        condition: service_healthy
    restart: unless-stopped